  abbreviations:
    JB2: Jupyter Book 2
    CI/CD: Continuous Integration/Continuous Deployment
    GHA: GitHub Actions
    GH: GitHub
    IDE: Integrated Development Environment
    VSC: Visual Studio Code
    CLI: commmand line interface

    
site:
  template: book-theme
  options:
    favicon: ./content/figures/favicon.svg            # path to your favicon
    style: ./css/custom.css
    logo: ./content/figures/logo-infotraining-light.svg     # path to your logo, shown top left at site
    logo_dark: ./content/figures/logo-infotraining-dark.svg # path to your logo for dark mode, shown top left at site
    folders: false
    hide_authors: true

  actions:
    - title: Feedback
      url: https://github.com/infotraining/docs-cpp-async/issues

exports:
  - format: typst
    template: lapreprint-typst
    output: exports/cpp-async.pdf
    id: output-pdf
